        background: var(--bg);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        margin: 0;
        user-select: none;
      }
      .container {
        width: 95%;

        border-radius: 12px;
        box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
      }

      /* Setup Screen */
      #setupScreen {
        animation: fadeIn 0.5s;
      }
      .section-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin: 20px 0;
      }
      .section-item {
        background: #334155;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        font-size: 0.85rem;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-item:hover {
        background: #475569;
      }
      .section-item.active {
        border-color: var(--selection);
        background: #1e3a8a;
      }
      .sec-num {
        background: var(--bg);
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
        color: var(--primary);
      }
      .input-group {
        margin: 20px 0;
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .field {
        text-align: left;
      }
      label {
        font-size: 0.8rem;
        color: #94a3b8;
        display: block;
        margin-bottom: 5px;
      }
      input {
        width: 120px;
        padding: 10px;
        border-radius: 6px;
        border: 2px solid #334155;
        background: #0f172a;
        color: white;
        outline: none;
      }

      /* Exam Elements */
      #examArea {
        display: none;
      }
      h2 {
        text-align: center;
        color: var(--primary);
        margin-top: 0;
      }
      #timer {
        text-align: center;
        font-size: 26px;
        margin: 15px;
        color: #22c55e;
        font-weight: bold;
        font-family: monospace;
      }

      .option {
        display: block;
        background: var(--bg);
        margin: 10px 0;
        padding: 12px 15px;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: 0.2s;
      }
      .selected {
        background: #334155;
        border-color: var(--primary);
      }
      .correct {
        background: #064e3b !important;
        border-color: #22c55e !important;
        color: #adfaad;
      }
      .wrong {
        background: #7f1d1d !important;
        border-color: #ef4444 !important;
        color: #fca5a5;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 6px;
        margin: 20px 0;
        max-height: 120px;
        overflow-y: auto;
        padding: 5px;
      }
      .palette button {
        padding: 8px 2px;
        border: none;
        cursor: pointer;
        background: #475569;
        color: white;
        border-radius: 4px;
      }
      .palette-correct {
        background: #22c55e !important;
      }
      .palette-wrong {
        background: #e11d48 !important;
      }
      .current {
        background: var(--primary) !important;
        outline: 2px solid white;
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      button.btn {
        flex: 1;
        padding: 15px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        color: white;
        text-transform: uppercase;
      }
      .btn-start {
        background: #22c55e;
        font-size: 1.1rem;
        box-shadow: 0 4px 0 #16a34a;
      }
      .btn-start:active {
        transform: translateY(2px);
        box-shadow: 0 2px 0 #16a34a;
      }
      .prev {
        background: #64748b;
      }
      .next {
        background: #2563eb;
      }
      .submit {
        background: var(--primary);
      }

      #resultBanner {
        display: none;
        text-align: center;
        background: #334155;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 2px solid var(--selection);
      }
      footer {
        text-align: center;
        padding: 20px 0;
        margin-top: 40px;
        color: #94a3b8;
        font-size: 0.9rem;
        border-top: 1px solid #334155;
        width: 100%;
        max-width: 900px;
      }
      footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }
      footer a:hover {
        color: #fb7185; /* A slightly lighter red for the hover effect */
        text-decoration: underline;
      }

  
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

let questions = [], current = 0, answers = [], timeLeft = 0, isReviewMode = false, timerInt;
let selectedSections = new Set();

function initSetup() {
    const grid = document.getElementById("sectionGrid");
    SECTIONS.forEach(sec => {
        const div = document.createElement("div");
        div.className = "section-item";
        div.innerHTML = `<span class="sec-num">${sec.id}</span><span>${sec.name}</span>`;
        div.onclick = () => {
            if (selectedSections.has(sec.id)) { selectedSections.delete(sec.id); div.classList.remove("active"); }
            else { selectedSections.add(sec.id); div.classList.add("active"); }
        };
        grid.appendChild(div);
    });
}

function selectAllSections() { SECTIONS.forEach(s => selectedSections.add(s.id)); document.querySelectorAll('.section-item').forEach(el => el.classList.add('active')); }
function clearSections() { selectedSections.clear(); document.querySelectorAll('.section-item').forEach(el => el.classList.remove('active')); }

function startExam() {
    let pool = ALL_QUESTIONS.filter(q => selectedSections.has(q.s));
    if (pool.length === 0) { alert("No questions found for selected sections!"); return; }
    
    let qty = Math.min(parseInt(document.getElementById("userQty").value), pool.length);
    questions = pool.sort(() => 0.5 - Math.random()).slice(0, qty);
    timeLeft = parseInt(document.getElementById("userTime").value) * 60;
    answers = new Array(qty).fill(null);
    current = 0; isReviewMode = false;

    document.getElementById("setupScreen").style.display = "none";
    document.getElementById("examArea").style.display = "block";
    createPalette(qty); loadQuestion(); startTimer();
}

function startTimer() {
    timerInt = setInterval(() => {
        if (isReviewMode) return;
        timeLeft--;
        const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
        document.getElementById("timer").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (timeLeft <= 0) submitExam(true);
    }, 1000);
}

function createPalette(qty) {
    const p = document.getElementById("palette"); p.innerHTML = "";
    for (let i = 0; i < qty; i++) {
        const btn = document.createElement("button"); btn.innerText = i + 1;
        btn.onclick = () => { current = i; loadQuestion(); }; p.appendChild(btn);
    }
}

function loadQuestion() {
    const q = questions[current], letters = ["A", "B", "C", "D"];
    let html = `<div><small>Section ${q.s}</small><h3>Q${current + 1}. ${q.q}</h3>`;
    q.o.forEach((opt, i) => {
        let cls = "option", L = letters[i];
        const isCorrect = q.a.toUpperCase() === L;
        const isSelected = answers[current] === L;
        if (isReviewMode) {
            if (isCorrect) cls += " correct";
            else if (isSelected) cls += " wrong";
        } else if (isSelected) cls += " selected";
        html += `<div class="${cls}" onclick="${isReviewMode ? '' : `selectAnswer('${L}')`}"><strong>${L}.</strong> ${opt}</div>`;
    });
    document.getElementById("questionBox").innerHTML = html;
    updatePalette();
}

function selectAnswer(L) { answers[current] = L; loadQuestion(); }
function nextQ() { if (current < questions.length - 1) { current++; loadQuestion(); } }
function prevQ() { if (current > 0) { current--; loadQuestion(); } }

function updatePalette() {
    document.querySelectorAll(".palette button").forEach((b, i) => {
        b.classList.remove("current");
        if (i === current) b.classList.add("current");
    });
}

function submitExam(force = false) {
    if (!force && !confirm("Submit exam?")) return;
    isReviewMode = true; clearInterval(timerInt);
    let score = 0; questions.forEach((q, i) => { if (answers[i] === q.a.toUpperCase()) score++; });
    alert(`Final Score: ${score} / ${questions.length}`);
    current = 0; loadQuestion();
}

initSetup();
</script>
